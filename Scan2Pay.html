<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA | Global QR Terminal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-dark: #05080a;
            --accent-cyan: #00f2ff;
            --accent-green: #00ff88;
            --panel-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh;
        }

        header {
            width: 100%; padding: 15px; text-align: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            background: rgba(10, 15, 24, 0.9); position: sticky; top: 0; z-index: 10;
        }

        /* Scan Counter HUD */
        .counter-hud {
            display: flex; gap: 20px; margin: 20px 0;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            padding: 10px 40px; border-radius: 50px;
        }
        .counter-val { font-size: 1.5rem; font-weight: 900; color: var(--accent-cyan); }
        .counter-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; align-self: center; }

        .scanner-frame {
            width: 90%; max-width: 450px; border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* History List */
        .history-container {
            width: 90%; max-width: 450px; margin-top: 25px; flex-grow: 1;
        }
        .history-item {
            background: var(--panel-bg); padding: 15px; margin-bottom: 10px;
            border-radius: 8px; border-left: 3px solid var(--accent-cyan);
            animation: slideIn 0.3s ease-out;
        }
        .history-data { font-size: 0.9rem; margin-bottom: 8px; word-break: break-all; }
        .history-meta { 
            display: flex; justify-content: space-between; 
            font-size: 10px; color: #64748b; font-family: monospace;
        }
        .location-tag { color: var(--accent-green); }

        .btn-clear {
            background: transparent; color: #ff4b2b; border: 1px solid #ff4b2b;
            padding: 5px 10px; font-size: 10px; cursor: pointer; border-radius: 4px;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; letter-spacing: 4px; color: var(--accent-cyan);">DSA SCAN TERMINAL</div>
    </header>

    <div class="counter-hud">
        <span class="counter-label">Total Scans:</span>
        <span id="scan-count" class="counter-val">0</span>
    </div>

    <div class="scanner-frame">
        <div id="reader"></div>
    </div>

    <div class="history-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="font-size: 12px; letter-spacing: 1px; color: #475569;">ACQUISITION LOGS</span>
            <button class="btn-clear" onclick="clearAll()">Purge Logs</button>
        </div>
        <div id="log-list"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let totalScans = parseInt(localStorage.getItem('dsa_total_scans') || '0');

        function updateCounter() {
            document.getElementById('scan-count').innerText = totalScans;
        }

        // Get Location Wrapper
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) resolve("Location Blocked");
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(`${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}`),
                    () => resolve("Unknown Loc")
                );
            });
        }

        async function onScanSuccess(decodedText) {
            // Keep scanner open by NOT stopping it, but adding a "cooldown"
            html5QrCode.pause(); // Pause to prevent double scans
            playChime();

            const loc = await getLocation();
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            saveEntry(decodedText, timestamp, loc);
            
            totalScans++;
            localStorage.setItem('dsa_total_scans', totalScans);
            updateCounter();

            // Resume after 2 seconds
            setTimeout(() => html5QrCode.resume(), 2000);
        }

        function saveEntry(text, time, loc) {
            let logs = JSON.parse(localStorage.getItem('dsa_global_logs') || '[]');
            logs.unshift({ text, time, loc });
            localStorage.setItem('dsa_global_logs', JSON.stringify(logs.slice(0, 20)));
            renderLogs();
        }

        function renderLogs() {
            const list = document.getElementById('log-list');
            const logs = JSON.parse(localStorage.getItem('dsa_global_logs') || '[]');
            list.innerHTML = logs.length ? '' : '<div style="color:#334155; font-size:12px;">Waiting for data...</div>';
            
            logs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="history-data">${log.text}</div>
                    <div class="history-meta">
                        <span>${log.time}</span>
                        <span class="location-tag">GPS: ${log.loc}</span>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function clearAll() {
            localStorage.removeItem('dsa_global_logs');
            localStorage.setItem('dsa_total_scans', '0');
            totalScans = 0;
            updateCounter();
            renderLogs();
        }

        function playChime() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        window.onload = () => {
            updateCounter();
            renderLogs();
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess);
        };
    </script>
</body>
</html>
