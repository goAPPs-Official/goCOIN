<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA | Geo-Terminal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-dark: #05080a;
            --accent-cyan: #00f2ff;
            --accent-green: #00ff88;
            --panel-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh;
        }

        header {
            width: 100%; padding: 15px; text-align: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            background: rgba(10, 15, 24, 0.9); position: sticky; top: 0; z-index: 10;
        }

        /* HUD & Counter */
        .counter-hud {
            display: flex; gap: 15px; margin: 20px 0;
            padding: 10px 30px; border-radius: 50px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(0, 242, 255, 0.05);
        }
        .counter-val { font-size: 1.4rem; font-weight: 900; color: var(--accent-cyan); transition: all 0.3s; }
        .counter-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; align-self: center; color: #94a3b8; }
        .pulse-glow { text-shadow: 0 0 15px var(--accent-cyan); transform: scale(1.1); }

        .scanner-frame {
            width: 92%; max-width: 450px; border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }

        /* History Logs */
        .history-container { width: 92%; max-width: 450px; margin-top: 25px; padding-bottom: 50px; }
        .history-item {
            background: var(--panel-bg); padding: 16px; margin-bottom: 12px;
            border-radius: 10px; border-left: 4px solid var(--accent-cyan);
            animation: slideIn 0.4s ease-out; position: relative;
        }
        .history-data { font-size: 0.95rem; margin-bottom: 10px; word-break: break-all; color: #e2e8f0; }
        
        .history-meta { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; color: #64748b; font-family: 'Courier New', monospace;
        }

        /* Map Link Styling */
        .map-link {
            color: var(--accent-green); text-decoration: none;
            display: flex; align-items: center; gap: 5px;
            padding: 4px 8px; border-radius: 4px; background: rgba(0, 255, 136, 0.05);
            transition: 0.2s;
        }
        .map-link:hover { background: rgba(0, 255, 136, 0.15); color: #fff; }

        .btn-clear {
            background: transparent; color: #ff4b2b; border: 1px solid #ff4b2b;
            padding: 6px 12px; font-size: 10px; cursor: pointer; border-radius: 4px; text-transform: uppercase;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; letter-spacing: 5px; color: var(--accent-cyan);">DSA TERMINAL PRO</div>
    </header>

    <div class="counter-hud">
        <span class="counter-label">Global Acquisitions</span>
        <span id="scan-count" class="counter-val">0</span>
    </div>

    <div class="scanner-frame">
        <div id="reader"></div>
    </div>

    <div class="history-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="font-size: 11px; letter-spacing: 2px; color: #475569; font-weight: bold;">LOG ENTRY STREAM</span>
            <button class="btn-clear" onclick="clearAll()">Wipe Memory</button>
        </div>
        <div id="log-list"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let totalScans = parseInt(localStorage.getItem('dsa_total_scans') || '0');

        function updateCounterUI(shouldAnimate = false) {
            const el = document.getElementById('scan-count');
            el.innerText = totalScans;
            if (shouldAnimate) {
                el.classList.add('pulse-glow');
                setTimeout(() => el.classList.remove('pulse-glow'), 500);
            }
        }

        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) resolve(null);
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => resolve(null),
                    { timeout: 5000 }
                );
            });
        }

        async function onScanSuccess(decodedText) {
            html5QrCode.pause();
            playChime();

            const coords = await getLocation();
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            saveEntry(decodedText, timestamp, coords);
            
            totalScans++;
            localStorage.setItem('dsa_total_scans', totalScans);
            updateCounterUI(true);

            setTimeout(() => html5QrCode.resume(), 2500);
        }

        function saveEntry(text, time, coords) {
            let logs = JSON.parse(localStorage.getItem('dsa_geo_logs') || '[]');
            logs.unshift({ text, time, coords });
            localStorage.setItem('dsa_geo_logs', JSON.stringify(logs.slice(0, 25)));
            renderLogs();
        }

        function renderLogs() {
            const list = document.getElementById('log-list');
            const logs = JSON.parse(localStorage.getItem('dsa_geo_logs') || '[]');
            list.innerHTML = logs.length ? '' : '<div style="color:#334155; font-size:12px; text-align:center; margin-top:20px;">SYSTEM READY: AWAITING INPUT</div>';
            
            logs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'history-item';
                
                let locationHtml = '<span>[GPS LOCKED]</span>';
                if (log.coords) {
                    const mapUrl = `https://www.google.com/maps?q=${log.coords.lat},${log.coords.lng}`;
                    locationHtml = `<a href="${mapUrl}" target="_blank" class="map-link">📍 ${log.coords.lat.toFixed(3)}, ${log.coords.lng.toFixed(3)}</a>`;
                }

                item.innerHTML = `
                    <div class="history-data">${log.text}</div>
                    <div class="history-meta">
                        <span>${log.time}</span>
                        ${locationHtml}
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function clearAll() {
            if(confirm("Confirm system wipe? All logs and counters will be erased.")) {
                localStorage.removeItem('dsa_geo_logs');
                localStorage.setItem('dsa_total_scans', '0');
                totalScans = 0;
                updateCounterUI();
                renderLogs();
            }
        }

        function playChime() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        window.onload = () => {
            updateCounterUI();
            renderLogs();
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
        };
    </script>
</body>
</html>
